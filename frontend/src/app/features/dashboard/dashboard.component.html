<div class="dashboard-grid">

  <mat-card class="card">
    <h3>Alunos Ativos</h3>
    <h1 class="valor ativo">{{ alunosAtivos }}</h1>
  </mat-card>

  <mat-card class="card">
    <h3>Faturamento Mensal</h3>
    <h1 class="valor">{{ faturamento | currency:'BRL':'symbol':'1.0-0' }}</h1>
  </mat-card>

  <mat-card class="card">
    <h3>Inadimplentes</h3>
    <h1 class="valor inadimplente">{{ inadimplentes }}</h1>
  </mat-card>

  <mat-card class="card">
    <h3>Novos Alunos</h3>
    <h1 class="valor novo">{{ novosAlunos }}</h1>
  </mat-card>

</div>

<div class="grafico-container">
  <mat-card class="card">
    <h3 class="titulo-grafico">Visão Geral</h3>
    <canvas id="grafico"></canvas>
  </mat-card>
</div>
