<div style="display:grid; grid-template-columns: repeat(4, 1fr); gap:16px">

  <mat-card>
    <h3>Alunos Ativos</h3>
    <h1>{{ alunosAtivos }}</h1>
  </mat-card>

  <mat-card>
    <h3>Faturamento Mensal</h3>
    <h1>{{ faturamento | currency:'BRL' }}</h1>
  </mat-card>

  <mat-card>
    <h3>Inadimplentes</h3>
    <h1>{{ inadimplentes }}</h1>
  </mat-card>

  <mat-card>
    <h3>Novos Alunos</h3>
    <h1>{{ novosAlunos }}</h1>
  </mat-card>

</div>
