<div style="display:flex; gap:12px; align-items:center; margin-bottom:12px;">
  <mat-form-field appearance="fill" style="flex:1;">
    <mat-label>Buscar Aluno</mat-label>
    <input matInput placeholder="Nome ou CPF" [(ngModel)]="filtro" (ngModelChange)="aplicarFiltro()">
  </mat-form-field>

  <a mat-raised-button color="primary" routerLink="/alunos/novo">
    Novo aluno
  </a>
</div>

<mat-card>
  <table mat-table [dataSource]="alunosFiltrados" class="mat-elevation-z8">
    <ng-container matColumnDef="nome">
      <th mat-header-cell *matHeaderCellDef>Nome</th>
      <td mat-cell *matCellDef="let aluno">{{ aluno.nome }}</td>
    </ng-container>

    <ng-container matColumnDef="cpf">
      <th mat-header-cell *matHeaderCellDef>CPF</th>
      <td mat-cell *matCellDef="let aluno">{{ aluno.cpf }}</td>
    </ng-container>

    <ng-container matColumnDef="plano">
      <th mat-header-cell *matHeaderCellDef>Plano</th>
      <td mat-cell *matCellDef="let aluno">{{ aluno.plano?.nome || '-' }}</td>
    </ng-container>

    <ng-container matColumnDef="acoes">
  <th mat-header-cell *matHeaderCellDef>Ações</th>

  <td mat-cell *matCellDef="let aluno">

    <!-- editar -->
    <button
      mat-icon-button
      color="primary"
      [routerLink]="['/alunos', aluno.id!]">

      <mat-icon>edit</mat-icon>

    </button>

    <!-- excluir -->
    <button
      mat-icon-button
      color="warn"
      (click)="excluir(aluno.id!)">

      <mat-icon>delete</mat-icon>

    </button>

  </td>
</ng-container>



    <tr mat-header-row *matHeaderRowDef="colunas"></tr>
    <tr mat-row *matRowDef="let row; columns: colunas;"></tr>


  </table>
</mat-card>
