<mat-card>

  <div style="display:flex; justify-content:space-between; margin-bottom:16px">

    <mat-form-field appearance="outline">

      <mat-label>Buscar plano</mat-label>

      <input
        matInput
        placeholder="Nome ou valor"
        (keyup)="aplicarFiltro($event)"
      >

    </mat-form-field>

    <button
      mat-raised-button
      color="primary"
      (click)="novo()">

      Novo Plano

    </button>

  </div>

  <table
    mat-table
    [dataSource]="dataSource"
    matSort
    class="mat-elevation-z2">

    <!-- Nome -->

    <ng-container matColumnDef="nome">

      <th
        mat-header-cell
        *matHeaderCellDef
        mat-sort-header>

        Nome

      </th>

      <td mat-cell *matCellDef="let plano">

        {{ plano.nome }}

      </td>

    </ng-container>

    <!-- Valor -->

    <ng-container matColumnDef="valor">

      <th
        mat-header-cell
        *matHeaderCellDef
        mat-sort-header>

        Valor

      </th>

      <td mat-cell *matCellDef="let plano">

        {{ plano.valor | currency:'BRL' }}

      </td>

    </ng-container>

    <!-- Duração -->

    <ng-container matColumnDef="duracaoMeses">

      <th
        mat-header-cell
        *matHeaderCellDef
        mat-sort-header>

        Duração

      </th>

      <td mat-cell *matCellDef="let plano">

        {{ plano.duracaoMeses }} meses

      </td>

    </ng-container>

    <!-- Ações -->

    <ng-container matColumnDef="acoes">

      <th mat-header-cell *matHeaderCellDef></th>

      <td mat-cell *matCellDef="let plano">

        <button
          mat-icon-button
          color="primary"
          (click)="editar(plano.id)">

          <mat-icon>edit</mat-icon>

        </button>

        <button
          mat-icon-button
          color="warn"
          (click)="excluir(plano.id)">

          <mat-icon>delete</mat-icon>

        </button>

      </td>

    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>

    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>

  </table>

  <mat-paginator
    [pageSize]="10"
    [pageSizeOptions]="[5,10,20]"
    showFirstLastButtons>
  </mat-paginator>

</mat-card>
