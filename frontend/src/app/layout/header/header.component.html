<mat-toolbar class="toolbar">

  <!-- Esquerda -->
  <div class="left">
    <span class="brand" routerLink="/dashboard">Biofit</span>
  </div>

  <!-- Direita -->
  <div class="right">

    <button mat-icon-button class="icon-btn" aria-label="Ajuda">
      <mat-icon>help_outline</mat-icon>
    </button>

    <button mat-stroked-button class="user-btn" [matMenuTriggerFor]="userMenu">
      <mat-icon>account_circle</mat-icon>
      <span class="user-label">Conta</span>
      <mat-icon>expand_more</mat-icon>
    </button>

    <mat-menu #userMenu="matMenu">
      <button mat-menu-item (click)="logout()">
        <mat-icon>logout</mat-icon>
        <span>Sair</span>
      </button>
    </mat-menu>

  </div>

</mat-toolbar>
