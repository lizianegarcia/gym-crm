<div class="toolbar">
  <button mat-raised-button color="primary" [routerLink]="['/alunos/novo']">Novo Aluno</button>
</div>

<table mat-table [dataSource]="alunos" class="mat-elevation-z8">

  <ng-container matColumnDef="nome">
    <th mat-header-cell *matHeaderCellDef> Nome </th>
    <td mat-cell *matCellDef="let aluno"> {{aluno.nome}} </td>
  </ng-container>

  <ng-container matColumnDef="plano">
    <th mat-header-cell *matHeaderCellDef> Plano </th>
    <td mat-cell *matCellDef="let aluno"> {{aluno.plano}} </td>
  </ng-container>

  <ng-container matColumnDef="status">
    <th mat-header-cell *matHeaderCellDef> Status </th>
    <td mat-cell *matCellDef="let aluno">
      <mat-chip color="primary" selected>{{aluno.status}}</mat-chip>
    </td>
  </ng-container>

  <ng-container matColumnDef="acoes">
    <th mat-header-cell *matHeaderCellDef> Ações </th>
    <td mat-cell *matCellDef="let aluno">
      <button mat-icon-button color="primary" [routerLink]="['/alunos', aluno.id]">
        <mat-icon>edit</mat-icon>
      </button>
      <button mat-icon-button color="warn" (click)="excluir(aluno.id)">
        <mat-icon>delete</mat-icon>
      </button>
    </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
</table>
